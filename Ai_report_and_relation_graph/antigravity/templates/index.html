<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Behavioral Intelligence Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <style>
        :root {
            --bg-main: #020617;
            --bg-sidebar: rgba(15, 23, 42, 0.85);
            --accent-blue: #38bdf8;
            --accent-purple: #818cf8;
            --accent-red: #f43f5e;
            --accent-green: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 5% 5%, rgba(56, 189, 248, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 95% 95%, rgba(129, 140, 248, 0.1) 0%, transparent 35%);
        }

        #details {
            width: 480px;
            height: 100vh;
            background: var(--bg-sidebar);
            backdrop-filter: blur(32px);
            border-right: 1px solid var(--border-color);
            padding: 40px;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            box-shadow: 20px 0 60px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header {
            margin-bottom: 56px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
            opacity: 0.8;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h3::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-blue);
            opacity: 0.8;
        }

        .card-red::before {
            background: var(--accent-red);
        }

        pre {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            line-height: 1.6;
            color: #94a3b8;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 14px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin: 8px 0;
        }

        .ai-explanation {
            font-size: 15px;
            line-height: 1.8;
            color: #cbd5e1;
            letter-spacing: 0.1px;
        }

        #graph {
            flex-grow: 1;
            height: 100vh;
            position: relative;
            z-index: 1;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .node-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .badge-process {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .badge-file {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            text-align: center;
            color: var(--text-secondary);
            border: 2px dashed var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.01);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 14px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 32px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-blue);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .controls-hint {
            position: absolute;
            bottom: 30px;
            left: 55%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            font-size: 11px;
            color: var(--text-secondary);
            z-index: 5;
            display: flex;
            gap: 20px;
            pointer-events: none;
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hint-item i {
            color: var(--accent-blue);
        }
    </style>
</head>

<body>

    <div class="ambient-glow"></div>

    <div id="details">
        <header>
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="logo">ANTIGRAVITY</div>
            </div>
            <div class="tagline">Behavioral Intelligence Engine</div>
        </header>

        <div id="panel-content">
            <div class="empty-state">
                <div style="font-size: 48px; margin-bottom: 24px; color: var(--accent-blue); opacity: 0.6;">
                    <i class="fas fa-project-diagram"></i>
                </div>
                <h2 style="font-size: 20px; margin-bottom: 12px; color: white;">Intelligence Workspace</h2>
                <p style="line-height: 1.6;">Click on a telemetry node to decrypt behavioral patterns and analyze
                    security indicators.</p>
                <div
                    style="margin-top: 40px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 16px; width: 100%;">
                    <div
                        style="display:flex; justify-content: space-between; margin-bottom: 10px; font-size: 10px; letter-spacing: 1px;">
                        <span>SCAN STATUS</span>
                        <span style="color: var(--accent-green)">COMPLETE</span>
                    </div>
                    <div style="height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px;">
                        <div
                            style="width: 100%; height: 100%; background: var(--accent-green); border-radius: 2px; box-shadow: 0 0 10px var(--accent-green)">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="graph"></div>

    <div class="controls-hint">
        <div class="hint-item"><i class="fas fa-mouse-pointer"></i> <span>Drag to Pan</span></div>
        <div class="hint-item"><i class="fas fa-compress-arrows-alt"></i> <span>Scroll to Zoom</span></div>
        <div class="hint-item"><i class="fas fa-hand-pointer"></i> <span>Click to Decode</span></div>
    </div>

    <script>
        const graphData = {{ graph | tojson }};

        const cy = cytoscape({
            container: document.getElementById('graph'),
            elements: [
                ...graphData.nodes.map(n => ({
                    data: {
                        id: n.id,
                        label: n.label,
                        type: n.type
                    }
                })),
                ...graphData.edges.map(e => ({
                    data: { id: e.id, source: e.source, target: e.target, label: e.type }
                }))
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': '#111827',
                        'border-width': 2,
                        'border-color': '#38bdf8',
                        'width': '60px',
                        'height': '60px',
                        'label': 'data(label)',
                        'color': '#f1f5f9',
                        'font-family': 'Outfit',
                        'font-size': '11px',
                        'font-weight': '600',
                        'text-valign': 'bottom',
                        'text-margin-y': '12px',
                        'text-background-opacity': 0.7,
                        'text-background-color': '#020617',
                        'text-background-padding': '4px',
                        'text-background-shape': 'round-rectangle',
                        'overlay-padding': '8px',
                        'transition-property': 'background-color, border-color, border-width, width, height',
                        'transition-duration': '0.25s',
                        'text-wrap': 'wrap',
                        'text-max-width': '140px'
                    }
                },
                {
                    selector: 'node[type="process"]',
                    style: {
                        'background-image': 'https://api.iconify.design/heroicons:cpu-chip-20-solid.svg?color=%2338bdf8',
                        'background-fit': 'contain',
                        'background-width': '45%',
                        'background-height': '45%',
                        'shape': 'ellipse'
                    }
                },
                {
                    selector: 'node[type="file"]',
                    style: {
                        'border-color': '#f43f5e',
                        'background-image': 'https://api.iconify.design/heroicons:document-text-20-solid.svg?color=%23f43f5e',
                        'background-fit': 'contain',
                        'background-width': '45%',
                        'background-height': '45%',
                        'shape': 'round-rectangle',
                        'corner-radius': 14
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': 'rgba(148, 163, 184, 0.2)',
                        'target-arrow-color': 'rgba(148, 163, 184, 0.2)',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier',
                        'label': 'data(label)',
                        'font-size': '10px',
                        'font-weight': '600',
                        'color': '#64748b',
                        'text-rotation': 'autorotate',
                        'text-margin-y': '-12px',
                        'arrow-scale': 1.3,
                        'font-family': 'Inter'
                    }
                },
                {
                    selector: 'node:selected',
                    style: {
                        'background-color': 'rgba(56, 189, 248, 0.1)',
                        'border-color': '#fff',
                        'border-width': 4,
                        'width': '72px',
                        'height': '72px'
                    }
                }
            ],
            layout: {
                name: 'breadthfirst',
                padding: 120,
                spacingFactor: 1.8,
                directed: true,
                animate: true,
                animationDuration: 1000
            },
            wheelSensitivity: 0.15
        });

        cy.on('tap', 'node', function (evt) {
            const node = evt.target;
            const type = node.data('type');
            const label = node.data('label');

            document.getElementById('panel-content').innerHTML = `
                <div class="glass-card">
                    <div style="display:flex; align-items:center; gap:16px;">
                        <div class="logo-icon" style="flex-shrink:0; background: ${type === 'process' ? 'var(--accent-blue)' : 'var(--accent-red)'}">
                            <i class="fas ${type === 'process' ? 'fa-microchip' : 'fa-file-code'}"></i>
                        </div>
                        <div>
                            <h2 style="margin-bottom:4px; font-size:18px;">${label}</h2>
                            <span class="node-badge ${type === 'process' ? 'badge-process' : 'badge-file'}">
                                ${type === 'process' ? 'Active Runtime' : 'Data Object'}
                            </span>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 32px;">
                    <h3 style="margin-top:0"><i class="fas fa-terminal" style="margin-right:8px; font-size:10px;"></i> Deciphering Entity</h3>
                    <div class="glass-card" style="padding: 40px; text-align: center;">
                        <div style="height: 12px; width: 60%; margin: 0 auto 16px;" class="shimmer"></div>
                        <div style="height: 100px; width: 100%;" class="shimmer"></div>
                        <p style="margin-top:20px; font-size:11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Synchronizing with LLM Engine...</p>
                    </div>
                </div>
            `;

            if (type !== 'process') {
                document.getElementById('panel-content').innerHTML = `
                    <div class="glass-card ${type === 'file' ? 'card-red' : ''}">
                        <div style="display:flex; align-items:center; gap:16px;">
                            <div class="logo-icon" style="flex-shrink:0; background: var(--accent-red)">
                                <i class="fas fa-file-code"></i>
                            </div>
                            <div>
                                <h2 style="margin-bottom:4px; font-size:18px;">${label}</h2>
                                <span class="node-badge badge-file">Static Resource</span>
                            </div>
                        </div>
                        <p style="margin-top: 24px; color: #cbd5e1; line-height:1.7;">FileSystem object detected. This entity was subject to IO operations during the observed execution window.</p>
                        
                        <button onclick="location.reload()" class="btn-reset">
                            <i class="fas fa-sync-alt"></i> Reset Intelligence
                        </button>
                    </div>
                `;
                return;
            }

            fetch(`/process/${node.id()}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('panel-content').innerHTML = `
                        <div class="glass-card">
                            <div style="display:flex; align-items:center; gap:16px;">
                                <div class="logo-icon" style="flex-shrink:0; background: var(--accent-blue)">
                                    <i class="fas fa-microchip"></i>
                                </div>
                                <div>
                                    <h2 style="margin-bottom:4px; font-size:18px;">${data.facts.process}</h2>
                                    <span class="node-badge badge-process">Active Execution</span>
                                </div>
                            </div>
                        </div>

                        <h3><i class="fas fa-code-branch" style="margin-right:10px;"></i> Telemetry Stream</h3>
                        <div class="glass-card" style="padding: 0;">
                            <pre style="max-height: 180px; border-radius: 0; background: transparent; border: none;">${JSON.stringify(data.facts.actions, null, 2)}</pre>
                        </div>

                        <h3><i class="fas fa-brain" style="margin-right:10px;"></i> AI Insights</h3>
                        <div class="glass-card">
                            <div class="ai-explanation">
                                ${data.explanation.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                        
                        <button onclick="location.reload()" class="btn-reset">
                            <i class="fas fa-shield-virus"></i> Clear Workspace
                        </button>
                    `;
                })
                .catch(err => {
                    document.getElementById('panel-content').innerHTML = `
                        <div class="glass-card card-red">
                            <h2 style="color:var(--accent-red)"><i class="fas fa-bug"></i> Analysis Fault</h2>
                            <p>${err}</p>
                        </div>
                    `;
                });
        });

        cy.on('mouseover', 'node', e => {
            document.body.style.cursor = 'pointer';
        });

        cy.on('mouseout', 'node', e => {
            document.body.style.cursor = 'default';
        });
    </script>
</body>

</html>
